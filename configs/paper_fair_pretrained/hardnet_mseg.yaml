data:
  augmentation: strong
  batch_size: 6
  image_size: 352
  num_workers: 4
  pin_memory: true
  root: data
eval:
  device: null
  loss: bce_dice
  threshold: 0.5
experiment:
  output_root: outputs_paper_fair_pretrained
  name: hardnet_mseg_pretrained
train:
  aux_loss_weight: 0.0
  aux_ramp_epochs: 0
  aux_warmup_epochs: 0
  epochs: 30
  eta_min: 1.0e-06
  grad_clip: 1.0
  loss: bce_dice
  lr: 0.0003
  mixed_precision: false
  deterministic: true
  deterministic_warn_only: true
  optimizer: adamw
  save_metric: dice
  save_metric_mode: max
  scheduler: cosine
  seed: 42
  t_max: 30
  threshold: 0.5
  weight_decay: 0.0001
  use_aux_outputs_loss: true
  use_boundary_loss: true
  gradient_accumulation_steps: 1
model:
  name: hardnet_mseg
  in_channels: 3
  num_classes: 1
  base_channels: 32
  norm: bn
  act: relu
  backbone_impl: official
  backbone_pretrained: true
  hardnet_arch: 68
notes:
  pretrained_backbone: Uses automatic public ImageNet backbone checkpoint download
    when available.
