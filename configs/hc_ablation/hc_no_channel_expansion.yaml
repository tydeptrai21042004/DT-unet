experiment:
  output_root: outputs_hc_ablation
  name: hc_no_channel_expansion
data:
  root: data
  image_size: 352
  batch_size: 6
  num_workers: 4
  pin_memory: true
  augmentation: baseline
train:
  epochs: 30
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  t_max: 30
  eta_min: 1.0e-06
  mixed_precision: false
  grad_clip: null
  seed: 42
  loss: bce_dice
  threshold: 0.5
  aux_loss_weight: 0.0
  aux_warmup_epochs: 0
  aux_ramp_epochs: 0
  save_metric: dice
  save_metric_mode: max
  use_aux_outputs_loss: false
  use_boundary_loss: false
eval:
  loss: bce_dice
  threshold: 0.5
  device: null
  include_aux_loss: false
model:
  name: hc_no_channel_expansion
  in_channels: 3
  num_classes: 1
  channels:
  - 32
  - 64
  - 128
  - 256
  - 512
  norm: bn
  act: relu
  hf_alpha: 0.5
  hf_alpha_start: 0.5
  hf_alpha_warmup_epochs: 0
  hf_expansion: 1.0
  hf_dropout: 0.0
  use_hf_regularizer: false
  hf_block_norm: gn
  hf_block_act: gelu
  mixer_act: gelu
  use_se: false
  use_gate: false
  gate_init_bias: -2.0
  decoder_use_cbam: false
  identity_init: true
  hf_projection: linear
  hf_mixer_rank: null
  hf_mixer_init_hw:
  - 22
  - 22
  hc_kernel_size: 3
  hc_h: 1.0
  hc_learnable_h: false
  hc_shared_kernel: false
ablation:
  suite: hc_unet
  variant: hc_no_channel_expansion
  purpose: Change mixer expansion from 1.5 to 1.0.
  reference_model: proposal_hc_unet_no_gate
