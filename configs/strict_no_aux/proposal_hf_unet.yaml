data:
  augmentation: strong
  batch_size: 6
  image_size: 352
  num_workers: 4
  pin_memory: true
  root: data
eval:
  device: null
  loss: bce_dice
  threshold: 0.5
experiment:
  output_root: outputs_strict_no_aux
  name: proposal_hf_unet_strict_no_aux
train:
  aux_loss_weight: 0.0
  aux_ramp_epochs: 0
  aux_warmup_epochs: 0
  epochs: 30
  eta_min: 1.0e-06
  grad_clip: 1.0
  loss: bce_dice
  lr: 0.0003
  mixed_precision: false
  deterministic: true
  deterministic_warn_only: true
  optimizer: adamw
  save_metric: dice
  save_metric_mode: max
  scheduler: cosine
  seed: 42
  t_max: 30
  threshold: 0.5
  weight_decay: 0.0001
  use_aux_outputs_loss: false
  use_boundary_loss: false
  gradient_accumulation_steps: 1
model:
  name: proposal_hf_unet
  in_channels: 3
  num_classes: 1
  channels:
  - 32
  - 64
  - 128
  - 256
  - 512
  hf_alpha: 0.5
  hf_alpha_start: 0.5
  hf_alpha_warmup_epochs: 0
  hf_expansion: 1.5
  hf_dropout: 0.1
  use_hf_regularizer: false
  norm: bn
  act: relu
  hf_block_norm: gn
  hf_block_act: gelu
  mixer_act: identity
  hf_projection: linear
  hf_mixer_init_hw:
  - 22
  - 22
  hf_mixer_rank: null
  use_se: false
  use_gate: true
  gate_init_bias: -2.0
  decoder_use_cbam: false
  identity_init: true
notes:
  strict_no_aux: Auxiliary side-output and boundary losses are disabled for architecture-only
    fair comparison.
